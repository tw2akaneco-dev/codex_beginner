<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <title>大类资产与政经日报</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --paper: #ffffff;
      --text: #1d2939;
      --muted: #667085;
      --line: #d9e2ec;
      --accent: #167f78;
      --sidebar: #0f302d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
    }
    header {
      background: var(--sidebar);
      color: #eef8f6;
      padding: 48px 24px;
    }
    .wrap {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.15;
      letter-spacing: 0;
    }
    .lead {
      max-width: 720px;
      margin: 0;
      color: rgba(255, 255, 255, 0.76);
      font-size: 17px;
    }
    main {
      padding: 28px 0 56px;
    }
    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .report-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .meta span {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 10px;
      color: var(--muted);
      font-size: 13px;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 20px;
      line-height: 1.4;
      letter-spacing: 0;
    }
    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    .empty {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      color: var(--muted);
    }
    footer {
      padding: 20px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
